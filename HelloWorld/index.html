<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Minimalist Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: radial-gradient(circle at top right, #f8fafc 0%, #f1f5f9 100%);
        }
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col items-center justify-center text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-700">

    <main class="max-w-2xl px-6 text-center fade-in">
        <div class="mb-8 inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-sm border border-slate-200 text-indigo-600">
            <i data-lucide="globe" class="w-8 h-8"></i>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 bg-clip-text text-transparent bg-gradient-to-br from-slate-900 to-slate-500">
            Hello World.
        </h1>
        
        <p class="text-lg md:text-xl text-slate-500 font-light leading-relaxed max-w-md mx-auto mb-10">
            A simple, clean, and modern demonstration of web typography and minimalist design principles.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button class="px-8 py-3 bg-slate-900 text-white rounded-full font-medium hover:bg-slate-800 transition-all duration-300 shadow-lg shadow-slate-200 active:scale-95">
                Get Started
            </button>
            <button class="px-8 py-3 bg-white text-slate-600 border border-slate-200 rounded-full font-medium hover:bg-slate-50 transition-all duration-300 active:scale-95 flex items-center gap-2">
                Learn More
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </main>

    <footer class="fixed bottom-8 w-full text-center px-6">
        <div class="flex flex-col items-center gap-4">
            <div class="h-px w-12 bg-slate-200"></div>
            <p class="text-xs uppercase tracking-widest text-slate-400 font-medium">
                Crafted with Precision
            </p>
            <div class="flex gap-6 text-slate-400">
                <a href="#" class="hover:text-indigo-500 transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-indigo-500 transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-indigo-500 transition-colors"><i data-lucide="mail" class="w-5 h-5"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
