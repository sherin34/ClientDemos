<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Minimalist Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
        }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .dot-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Background Elements -->
    <div class="absolute inset-0 dot-pattern opacity-40"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px]"></div>
    
    <!-- Main Content -->
    <main class="relative z-10 px-6 text-center">
        <div class="mb-8 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs font-medium tracking-wider uppercase text-indigo-400 animate-pulse">
            <i data-lucide="sparkles" class="w-3 h-3"></i>
            New Beginnings
        </div>
        
        <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-6">
            <span class="gradient-text">Hello World.</span>
        </h1>
        
        <p class="text-slate-400 text-lg md:text-xl max-w-xl mx-auto leading-relaxed mb-10">
            A simple message to mark the start of something extraordinary. 
            Crafted with precision, designed for the future.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="#" class="glass-card px-8 py-3 rounded-xl font-semibold transition-all hover:bg-white/10 flex items-center gap-2 group">
                Explore Work
                <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
            </a>
            <a href="#" class="px-8 py-3 rounded-xl font-semibold text-slate-400 hover:text-white transition-colors">
                Documentation
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="absolute bottom-10 left-0 w-full px-10 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-sm">
        <div class="flex items-center gap-4">
            <a href="#" class="hover:text-white transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
            <a href="#" class="hover:text-white transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
            <a href="#" class="hover:text-white transition-colors"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
        </div>
        <div class="flex items-center gap-1">
            Built with <i data-lucide="heart" class="w-3 h-3 text-rose-500 fill-rose-500"></i> by Design Studio
        </div>
    </footer>

    <!-- Decorative Icon -->
    <div class="absolute top-20 right-20 animate-float opacity-20 hidden lg:block">
        <i data-lucide="globe" class="w-24 h-24 text-white"></i>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
